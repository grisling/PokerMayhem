<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>PokerMayhem</title>
    <link rel="stylesheet" href="stylesheet.css">
    <script src="script.js"></script>
</head>
<body>
    <!-- Fendelivs container-->
    <div  id="fjendeLivBoks" class="liv-boks">Fjende: <span id="fjendeLiv">100</span> HP</div>
    
    <!-- Beholder til kortene på hånden -->
    <div id="haandContainer" class="haand"></div>
    
    <!-- Viser hvilken pokerhånd man har -->
    <div id="haandResultat" class="resultat"></div>
    
    <!-- Knapper -->
    <div>
        <button id="knapNytSpil">Nyt spil</button>
        <button id="knapTraekFem">Træk 5 kort</button>
        <button id="knapGivSkade">Giv Skade</button>
    </div>
</body>
</html>
